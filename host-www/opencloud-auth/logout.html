<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="logoutPageTitle">Kilómetro 0 Digital — Sesión cerrada</title>
  <meta name="description" content="Sesión cerrada en OpenCloud — Kilómetro 0 Digital" data-i18n-meta="logoutMetaDescription" />
  <link rel="canonical" href="https://cloud.km0digital.com/logout" />
  <meta property="og:title" content="Kilómetro 0 Digital — OpenCloud" />
  <meta property="og:description" content="Sesión cerrada en OpenCloud — Kilómetro 0 Digital" />
  <meta property="og:image" content="https://cloud.km0digital.com/brand/og-preview.png" />
  <meta property="og:url" content="https://cloud.km0digital.com/logout" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="KM0 Digital Cloud" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Kilómetro 0 Digital — OpenCloud" />
  <meta name="twitter:description" content="Sesión cerrada en OpenCloud — Kilómetro 0 Digital" />
  <meta name="twitter:image" content="https://cloud.km0digital.com/brand/og-preview.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #0B1220;
      --snow: #141B28;
      --mist: #2A3344;
      --ink: #E6E9ED;
      --ink-muted: rgba(230, 233, 237, 0.65);
      --signal: #2DD4BF;
      --signal-hover: #5EEAD4;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      position: relative;
      width: min(440px, 92vw);
      padding: 2.5rem 2rem 2rem;
      border-radius: 12px;
      background: var(--snow);
      border: 1px solid var(--mist);
      text-align: center;
    }
    .km0-lang-switch {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 2px;
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--mist);
      background: transparent;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .km0-lang-switch__btn {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      font: inherit;
      padding: 6px 10px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .km0-lang-switch__btn:hover { color: var(--ink); }
    .km0-lang-switch__btn--active {
      background: var(--mist);
      color: var(--ink);
    }
    .km0-lang-switch__btn:focus-visible {
      outline: 2px solid var(--signal);
      outline-offset: 2px;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.25rem;
      display: block;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin: 0 0 0.75rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-family: 'Bricolage Grotesque', 'IBM Plex Sans', sans-serif;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--ink);
    }
    .tagline {
      margin: 0 0 1.25rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .intro {
      margin: 0 0 1.5rem;
      color: var(--ink-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .logout-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 320px;
      margin: 0 auto;
    }
    .btn-primary {
      align-items: center;
      background: var(--signal);
      border: 0;
      border-radius: 8px;
      color: var(--paper);
      cursor: pointer;
      display: inline-flex;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      justify-content: center;
      padding: 0.85rem 2rem;
      text-decoration: none;
      transition: background 0.2s var(--ease);
      width: 100%;
    }
    .btn-primary:hover {
      background: var(--signal-hover);
    }
    .btn-primary:focus-visible {
      outline: 2px solid var(--signal);
      outline-offset: 2px;
    }
    .btn-secondary {
      align-items: center;
      background: transparent;
      border: 1px solid var(--mist);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      justify-content: center;
      padding: 0.85rem 2rem;
      text-decoration: none;
      transition: border-color 0.2s var(--ease), color 0.2s var(--ease);
      width: 100%;
    }
    .btn-secondary:hover {
      border-color: var(--signal);
      color: var(--signal-hover);
    }
    .btn-secondary:focus-visible {
      outline: 2px solid var(--signal);
      outline-offset: 2px;
    }
    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--ink-muted);
    }
    footer a {
      color: var(--ink-muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--signal); }
  </style>
</head>
<body>
  <div class="card">
    <nav class="km0-lang-switch" role="navigation" aria-label="Idioma">
      <button type="button" class="km0-lang-switch__btn" data-lang="ca" aria-pressed="false">CA</button>
      <button type="button" class="km0-lang-switch__btn km0-lang-switch__btn--active" data-lang="es" aria-pressed="true">ES</button>
      <button type="button" class="km0-lang-switch__btn" data-lang="en" aria-pressed="false">EN</button>
      <button type="button" class="km0-lang-switch__btn" data-lang="de" aria-pressed="false">DE</button>
    </nav>
    <img class="logo" src="/logo.svg" alt="Kilómetro 0 Digital" width="72" height="72" />
    <p class="eyebrow" data-i18n="loginEyebrow">Kilómetro 0 Digital</p>
    <h1 data-i18n="logoutTitle">Sesión cerrada</h1>
    <p class="tagline" data-i18n="landingTagline">Origen local · Impacto digital</p>
    <p class="intro" data-i18n="logoutMessage">Has cerrado sesión en OpenCloud correctamente.</p>

    <div class="logout-actions">
      <a class="btn-primary" href="/login.html" data-i18n="logoutReturnLogin">Volver a iniciar sesión</a>
      <a class="btn-secondary" href="https://km0digital.com/" data-i18n="logoutGoHome">Ir a km0digital.com</a>
    </div>

    <footer>
      <a href="https://km0digital.com/" target="_blank" rel="noopener">km0digital.com</a>
    </footer>
  </div>
  <script src="/dex/theme/i18n.js"></script>
  <script src="/dex-auth.js"></script>
  <script>
    (function () {
      'use strict';
      if (window.KM0DexAuth && window.KM0DexAuth.completeLogoutIfNeeded) {
        window.KM0DexAuth.completeLogoutIfNeeded();
      } else if (window.KM0DexAuth && window.KM0DexAuth.clearAllAuthState) {
        window.KM0DexAuth.clearAllAuthState();
      }
    })();
  </script>
</body>
</html>
