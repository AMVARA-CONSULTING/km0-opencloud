# Template — rendered by docker-entrypoint.sh
issuer: ISSUER_PLACEHOLDER
storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db
web:
  http: 0.0.0.0:5556
  allowedOrigins:
    - 'https://ISSUER_HOST_PLACEHOLDER'
frontend:
  dir: /etc/dex/web
  theme: km0
  issuer: Kilómetro 0 Digital
  logo: theme/logo.png
logger:
  level: info
  format: json
oauth2:
  skipApprovalScreen: true
  # Primary picker is /login.html; skip Dex screen when only one connector matches
  alwaysShowLoginScreen: false
  responseTypes:
    - code
    - id_token
staticClients:
  - id: OPENCLOUD_WEB_CLIENT_ID_PLACEHOLDER
    name: OpenCloud Web
    public: true
    redirectURIs:
      - 'https://ISSUER_HOST_PLACEHOLDER/'
      - 'https://ISSUER_HOST_PLACEHOLDER/oidc-callback.html'
      - 'https://ISSUER_HOST_PLACEHOLDER/oidc-silent-redirect.html'
  # Fixed client IDs required by OpenCloud native apps (see OpenCloud external IdP docs).
  - id: OpenCloudDesktop
    name: OpenCloud Desktop
    public: true
    # Empty: Dex v2.42+ accepts http://127.0.0.1:<ephemeral-port> and http://localhost:<port>.
    # Non-empty port-less URIs break desktop (strict match). Web/mobile clients unchanged below.
    redirectURIs: []
  - id: OpenCloudAndroid
    name: OpenCloud Android
    public: true
    redirectURIs:
      - 'oc://android.opencloud.eu'
  - id: OpenCloudIOS
    name: OpenCloud iOS
    public: true
    redirectURIs:
      - 'oc://ios.opencloud.eu'
# Local username/password via OpenCloud built-in IDM LDAP (not static Dex passwords).
connectors:
  - type: ldap
    id: ldap
    name: OpenCloud
    config:
      host: OPENCLOUD_LDAP_HOST_PLACEHOLDER:9235
      rootCA: /etc/dex/opencloud-idm-ldap.crt
      bindDN: uid=libregraph,ou=sysusers,o=libregraph-idm
      bindPW: OPENCLOUD_IDM_BIND_PW_PLACEHOLDER
      usernamePrompt: Username or email
      userSearch:
        baseDN: ou=users,o=libregraph-idm
        filter: "(objectClass=inetOrgPerson)"
        username: uid
        idAttr: openCloudUUID
        emailAttr: mail
        nameAttr: displayName
        preferredUsernameAttr: uid
  - type: google
    id: google
    name: Google
    config:
      clientID: GOOGLE_CLIENT_ID_PLACEHOLDER
      clientSecret: GOOGLE_CLIENT_SECRET_PLACEHOLDER
      redirectURI: ISSUER_PLACEHOLDER/callback
