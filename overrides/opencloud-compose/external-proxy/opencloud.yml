---
services:
  opencloud:
      environment:
        # bind to all interfaces
        PROXY_HTTP_ADDR: "0.0.0.0:9200"
        # Allow Dex (opencloud_opencloud-net) to reach built-in IDM LDAPS on 9235.
        # OpenCloud 7.3+ no longer defaults cert/key when IDM_LDAPS_ADDR is set.
        IDM_LDAPS_ADDR: "0.0.0.0:9235"
        IDM_LDAPS_CERT: /var/lib/opencloud/idm/ldap.crt
        IDM_LDAPS_KEY: /var/lib/opencloud/idm/ldap.key
        # Keep built-in idp for local username/password login alongside Dex/Google OIDC
        OC_EXCLUDE_RUN_SERVICES: ""
        # config.json OIDC routing is handled by nginx (local vs Dex); keep login URL here
        WEB_OPTION_LOGIN_URL: https://${OC_DOMAIN:-cloud.km0digital.com}/km0-session-gate.html
        WEB_OIDC_SCOPE: "openid profile email offline_access"
        WEB_OIDC_POST_LOGOUT_REDIRECT_URI: https://auth.km0digital.com/login?service=cloud&signed_out=1
      # Docker embedded DNS often fails to resolve the public hostname from inside the container
      extra_hosts:
        - "${OC_DOMAIN:-cloud.km0digital.com}:host-gateway"
        # Local km0-mail Postfix submission (SMTP relay without auth from Docker networks)
        - "host.docker.internal:host-gateway"
      ports:
        # expose the opencloud server on localhost
        - "127.0.0.1:9200:9200"
