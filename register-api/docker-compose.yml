services:
  register-api:
    build: .
    container_name: opencloud-register-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GRAPH_BASE_URL: ${GRAPH_BASE_URL:-http://opencloud:9200}
      GRAPH_SERVICE_USER: ${GRAPH_SERVICE_USER:-}
      GRAPH_SERVICE_APP_TOKEN: ${GRAPH_SERVICE_APP_TOKEN:-}
      GRAPH_SERVICE_PASSWORD: ${GRAPH_SERVICE_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://cloud.km0digital.com,https://mail.km0digital.com}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-km0digital.com}
      MAIL_PROVISION_API_URL: ${MAIL_PROVISION_API_URL:-http://mail-provision-api:8092}
      MAIL_PROVISION_API_TOKEN: ${MAIL_PROVISION_API_TOKEN:-}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
      MIN_SPECIAL_CHARACTERS: ${MIN_SPECIAL_CHARACTERS:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8091:8091"
    networks:
      - opencloud-net
      - mailnet

networks:
  opencloud-net:
    external: true
    name: opencloud_opencloud-net
  mailnet:
    external: true
    name: km0-mail_mailnet
