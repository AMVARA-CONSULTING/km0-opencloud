# Shared OpenCloud + Dex locations (include from each TLS server_name)

location /brand/ {
    alias /var/www/opencloud-auth/brand/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

location = /favicon.svg {
    alias /var/www/opencloud-auth/favicon.svg;
    default_type image/svg+xml;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

location = /logo.svg {
    alias /var/www/opencloud-auth/logo.svg;
    default_type image/svg+xml;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

# KM0 favicon overrides OpenCloud default theme asset for authenticated SPA.
location = /themes/opencloud/assets/favicon.svg {
    alias /var/www/opencloud-auth/favicon.svg;
    default_type image/svg+xml;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

location = /login.html {
    return 302 https://auth.km0digital.com/login?service=cloud$is_args$args;
}

location = /km0-oidc-start.html {
    alias /var/www/opencloud-auth/km0-oidc-start.html;
    default_type text/html;
}

location = /km0-sso-snippet.js {
    alias /var/www/opencloud-auth/km0-sso-snippet.js;
    default_type application/javascript;
    expires 1h;
    add_header Cache-Control "public";
}

location = /dex-auth.js {
    alias /var/www/opencloud-auth/dex-auth.js;
    default_type application/javascript;
    expires 1h;
    add_header Cache-Control "public";
}

location = /register {
    return 302 https://auth.km0digital.com/register$is_args$args;
}

location = /logout {
    return 302 https://auth.km0digital.com/login?service=cloud&signed_out=1$is_args$args;
}

location = /register.html {
    return 301 /register$is_args$args;
}

location = /api/register {
    limit_req zone=km0_register burst=2 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8091/register;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location = /oidc/local-metadata.json {
    alias /var/www/opencloud-auth/local-metadata.json;
    default_type application/json;
}

location = /config.json {
    # All auth goes through Dex now — always serve the Dex config.
    rewrite ^ /_internal/opencloud-config-dex.json last;
}

# OpenCloud SPA /login route re-triggers OIDC without connector_id → Google loop.
location = /login {
    return 302 https://auth.km0digital.com/login?service=cloud$is_args$args;
}

# Legacy built-in idp identifier form — tokens are not Dex-issued; send to hub.
location ~ ^/signin/v1/identifier(/|$) {
    return 302 https://auth.km0digital.com/login?service=cloud;
}

location = /_internal/opencloud-config-local.json {
    internal;
    alias /var/www/opencloud-auth/config-local.json;
    default_type application/json;
}

location = /_internal/opencloud-config-dex.json {
    internal;
    alias /var/www/opencloud-auth/config-dex.json;
    default_type application/json;
}

# OpenCloud SPA signinRedirect hits /dex/auth without connector_id → Dex picker (duplicate UX).
location = /dex/auth {
    if ($km0_dex_auth_to_login) {
        return 302 https://auth.km0digital.com/login?service=cloud$is_args$args;
    }

    proxy_pass http://127.0.0.1:5556/dex/auth$is_args$args;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location /dex/ {
    proxy_pass http://127.0.0.1:5556/dex/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location ~ ^/signin/v1/identifier/static/(.*)$ {
    proxy_pass http://127.0.0.1:9200/signin/v1/static/$1;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/signin/v1/identifier/identifier/(.*)$ {
    proxy_pass http://127.0.0.1:9200/signin/v1/identifier/$1;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = / {
    # Local idp used redirect_uri=/ ; send OAuth codes to the SPA callback handler.
    if ($args ~ "code=") {
        return 302 /oidc-callback.html?$args;
    }
    if ($km0_root_to_login) {
        return 302 https://auth.km0digital.com/login?service=cloud;
    }

    proxy_pass http://127.0.0.1:9200;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    include /etc/nginx/snippets/opencloud-social-preview-proxy.conf;
}

location / {
    proxy_pass http://127.0.0.1:9200;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    include /etc/nginx/snippets/opencloud-social-preview-proxy.conf;

    proxy_set_header Accept-Encoding "";
    sub_filter '</body>' '<script src="/km0-sso-snippet.js"></script></body>';
}

add_header X-Frame-Options SAMEORIGIN always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy no-referrer always;
