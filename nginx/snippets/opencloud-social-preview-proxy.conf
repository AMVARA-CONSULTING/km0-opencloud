# Open Graph / Twitter Card injection for social crawlers (include in OpenCloud proxy locations).
# Requires $km0_social_crawler and $km0_branded_title from conf.d/opencloud-map.conf.

# Upstream must return uncompressed HTML so sub_filter can inject metadata.
proxy_set_header Accept-Encoding "";

set $km0_og_tags "";
if ($km0_social_crawler) {
    set $km0_og_tags '<meta property="og:title" content="Kilómetro 0 Digital — OpenCloud" />
<meta property="og:description" content="Acceso a OpenCloud — Kilómetro 0 Digital" />
<meta property="og:image" content="https://cloud.km0digital.com/brand/og-preview.png" />
<meta property="og:url" content="https://$host$request_uri" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="KM0 Digital Cloud" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Kilómetro 0 Digital — OpenCloud" />
<meta name="twitter:description" content="Acceso a OpenCloud — Kilómetro 0 Digital" />
<meta name="twitter:image" content="https://cloud.km0digital.com/brand/og-preview.png" />
<meta name="description" content="Acceso a OpenCloud — Kilómetro 0 Digital" />
<link rel="canonical" href="https://$host$request_uri" />';
}

sub_filter '</head>' '$km0_og_tags</head>';
sub_filter '<title>OpenCloud</title>' '$km0_branded_title';
sub_filter_once on;
sub_filter_types text/html;
