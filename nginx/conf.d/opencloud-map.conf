# Must live in http context (included via /etc/nginx/conf.d/)
map $args $km0_root_to_login {
    default 1;
    "~*code=" 0;
    "~*error=" 0;
    "~*oidc=1" 0;
}

# Dex connector picker without connector_id duplicates /login.html — send to landing
# for web only. Native clients (OpenCloudDesktop/Android/iOS) reach Dex directly.
map $arg_connector_id $km0_dex_auth_missing_connector {
    default 0;
    ""      1;
}

map $arg_client_id $km0_dex_auth_is_web_client {
    default 0;
    ""              1;
    "opencloud-web" 1;
}

map "$km0_dex_auth_missing_connector:$km0_dex_auth_is_web_client" $km0_dex_auth_to_login {
    default 0;
    "1:1"   1;
}
