# Must live in http context (included via /etc/nginx/conf.d/)
map $args $km0_root_to_login {
    default 1;
    "~*code=" 0;
    "~*error=" 0;
    "~*oidc=1" 0;
}

# Dex connector picker without connector_id duplicates /login.html — send to landing
# for web only. Native clients (OpenCloudDesktop/Android/iOS) reach Dex directly.
map $arg_connector_id $km0_dex_auth_missing_connector {
    default 0;
    ""      1;
}

map $arg_client_id $km0_dex_auth_is_web_client {
    default 0;
    ""              1;
    "opencloud-web" 1;
}

map "$km0_dex_auth_missing_connector:$km0_dex_auth_is_web_client" $km0_dex_auth_to_login {
    default 0;
    "1:1"   1;
}

# Social / messenger link-preview crawlers (no JavaScript execution)
map $http_user_agent $km0_social_crawler {
    default 0;
    ~*(?:facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|Slack-ImgProxy|TelegramBot|WhatsApp|Discordbot|bingpreview|Applebot|Pinterestbot) 1;
}

map $km0_social_crawler $km0_branded_title {
    default '<title>OpenCloud</title>';
    1       '<title>Kilómetro 0 Digital — OpenCloud</title>';
}
